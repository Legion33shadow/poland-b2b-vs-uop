<script>

function exportPDF(){
  document.querySelector('.share-bar').style.display='none';
  document.querySelector('.capture-box').style.display='none';
  window.print();
  setTimeout(()=>{
    document.querySelector('.share-bar').style.display='flex';
    document.querySelector('.capture-box').style.display='block';
  },1000);
}
function shareReddit(){
  const txt = encodeURIComponent('Poland B2B vs UoP: my real difference is '+plDiff+' PLN/month — calculated with this tool');
  const url = encodeURIComponent(window.location.href);
  window.open('https://www.reddit.com/submit?title='+txt+'&url='+url,'_blank');
}
function shareTwitter(){
  const txt = encodeURIComponent('Poland B2B vs UoP: my real difference is '+plDiff+' PLN/month — calculated with this tool'+' '+window.location.href);
  window.open('https://twitter.com/intent/tweet?text='+txt,'_blank');
}
function submitEmail(e){
  e.preventDefault();
  const email = document.getElementById('cap_email').value;
  if(!email) return;
  const form  = new FormData();
  form.append('email', email);
  form.append('source', 'poland-b2b-vs-uop');
  form.append('result', plDiff || 'N/A');
  fetch('https://formspree.io/f/xpwzpwzp',{
    method:'POST', body:form,
    headers:{'Accept':'application/json'}
  }).then(()=>{
    document.getElementById('cap_email').value='';
    document.getElementById('cap_thanks').style.display='block';
  }).catch(()=>{});
  return false;
}


var plDiff = 0;
function calcPL(){
  const gross   = parseFloat(document.getElementById('gross').value)||0;
  const form    = document.getElementById('form').value;
  const zus     = document.getElementById('zus').value;
  // UoP (employment contract)
  const em_ZUS  = gross*0.1371;
  const em_NFZ  = (gross - em_ZUS)*0.09;
  const taxable = gross - em_ZUS;
  let uopTax = 0;
  if(taxable <= 120000) uopTax = taxable*0.12 - 3600;
  else uopTax = (120000*0.12-3600) + (taxable-120000)*0.32;
  uopTax = Math.max(uopTax, 0);
  const uopNet  = gross - em_ZUS - em_NFZ - uopTax;
  // B2B
  let b2bZUS = 0;
  if(zus==='pelny') b2bZUS = 1600;       // pełny ZUS 2026 (approx)
  else if(zus==='maly') b2bZUS = 400;    // mały ZUS
  else b2bZUS = 0;                       // ulga na start (6 mois)
  const b2bNFZ  = 419;                   // NFZ ryczałt 2026 (approx)
  let b2bTax = 0;
  const b2bIncome = gross - b2bZUS;
  if(form==='liniowy') b2bTax = b2bIncome * 0.19;
  else if(form==='ryczalt'){
    b2bTax = b2bIncome <= 60000 ? b2bIncome*0.12 :
             60000*0.12 + (b2bIncome-60000)*0.14;
  } else {
    if(b2bIncome<=120000) b2bTax = b2bIncome*0.12-3600;
    else b2bTax = (120000*0.12-3600)+(b2bIncome-120000)*0.32;
    b2bTax = Math.max(b2bTax,0);
  }
  const b2bNet = gross - b2bZUS*12/12 - b2bNFZ - b2bTax;
  plDiff = Math.round(b2bNet - uopNet);
  document.getElementById('res_uop').textContent  = uopNet.toFixed(0)+' PLN';
  document.getElementById('res_b2b').textContent  = b2bNet.toFixed(0)+' PLN';
  document.getElementById('res_diff').textContent = (plDiff>=0?'+':'')+plDiff+' PLN';
  document.getElementById('res_uoptax').textContent = uopTax.toFixed(0)+' PLN';
  document.getElementById('res_b2btax').textContent = b2bTax.toFixed(0)+' PLN';
  const shock = document.getElementById('shock_pl');
  shock.style.display='block';
  shock.className = 'shock '+(plDiff>0?'shock-green':'shock-red');
  shock.innerHTML = plDiff>0
    ? 'B2B gives you <strong>+'+plDiff+' PLN/mo</strong> more than UoP'
    : 'UoP gives you <strong>'+Math.abs(plDiff)+' PLN/mo</strong> more than B2B with this setup';
  document.getElementById('aff_box').style.display='block';
  document.getElementById('capture_section').style.display='block';
}

window.onload = calcPL;
</script>
